<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buried Spire of Kuwait - Explorer Mode</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
            color: white;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 2px solid #333;
            background: #111;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            min-width: 220px;
        }
        #minimap {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 150px;
            height: 150px;
            border: 2px solid #444;
            background: rgba(0,0,0,0.8);
            border-radius: 5px;
        }
        #inventory {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #333;
        }
        .inventory-slot {
            width: 50px;
            height: 50px;
            border: 2px solid #444;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(0,0,0,0.5);
            position: relative;
        }
        .inventory-slot::before {
            content: attr(data-key);
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #666;
            background: rgba(0,0,0,0.8);
            padding: 0 4px;
            border-radius: 2px;
        }
        .inventory-slot.active {
            border-color: #ffeb3b;
            box-shadow: 0 0 10px #ffeb3b;
        }
        #story {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            color: #aaa;
            font-size: 12px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 5px;
            border-radius: 5px;
        }
        .light-bar {
            width: 200px;
            height: 20px;
            background: #222;
            border: 1px solid #444;
            margin-top: 5px;
        }
        .light-fill {
            height: 100%;
            background: linear-gradient(to right, #ffeb3b, #ff9800);
            transition: width 0.3s;
        }
        .power-indicator {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
        .mode-badge {
            background: #2e7d32;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            margin-top: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <canvas id="minimap" style="display: none;"></canvas>
        <div id="ui" style="display: none;">
            <div>Floor: <span id="floor">-1</span> / -50</div>
            <div>Light: <span id="lightTime">100</span>%</div>
            <div class="light-bar">
                <div class="light-fill" id="lightBar"></div>
            </div>
            <div style="margin-top: 10px">Orbs: <span id="orbs">0</span></div>
            <div id="powerStatus" class="power-indicator"></div>
            <div class="mode-badge">EXPLORER MODE</div>
            <div style="margin-top: 5px; font-size: 11px; color: #666;">
                Checkpoint: Floor <span id="checkpoint">1</span>
            </div>
            <div style="margin-top: 5px; font-size: 10px; color: #555;">
                Press H for help
            </div>
        </div>
        <div id="inventory" style="display: none;">
            <div class="inventory-slot" id="slot1"></div>
            <div class="inventory-slot" id="slot2"></div>
            <div class="inventory-slot" id="slot3"></div>
        </div>
        <div id="story" style="display: none;">
            The Burj Mubarak stretches below you, buried in sand and darkness...
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');
        
        canvas.width = 800;
        canvas.height = 600;
        minimapCanvas.width = 150;
        minimapCanvas.height = 150;

        // Game state
        const game = {
            state: 'menu',
            mode: 'explorer',
            deathScreen: false,
            showHelp: false,
            stats: {
                totalOrbs: 0,
                totalFloors: 0,
                totalDeaths: 0,
                bestFloor: 1,
                sessionTime: 0
            },
            player: {
                x: 400,
                y: 300,
                speed: 3,
                light: 100,
                maxLight: 100,
                lightRadius: 150,
                orbsCollected: 0,
                inventory: [null, null, null],
                selectedSlot: 0,
                powers: {
                    phase: 0,
                    regeneration: 0,
                    reveal: 0
                },
                deathMarkers: []
            },
            camera: {
                x: 0,
                y: 0
            },
            floor: 1,
            checkpoint: 1,
            ghouls: [],
            orbs: [],
            walls: [],
            stairs: null,
            particles: [],
            explored: new Set(),
            gameOver: false,
            victory: false,
            swarming: false,
            swarmTimer: 0,
            darknessFade: 0,
            time: 0,
            mapWidth: 30,
            mapHeight: 20
        };

        // Orb types
        const orbTypes = {
            common: { symbol: 'O', color: '#64b5f6', lightBonus: 20 },
            golden: { symbol: '@', color: '#ffeb3b', lightBonus: 40 },
            purple: { symbol: 'P', color: '#9c27b0', power: 'phase' },
            green: { symbol: 'G', color: '#4caf50', power: 'regeneration' },
            white: { symbol: 'W', color: '#ffffff', power: 'reveal' },
            red: { symbol: '♥', color: '#f44336', power: 'lifeline' },
            wisp: { symbol: '*', color: '#ccccff', lightBonus: 50 }
        };

        // Input handling
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            
            // Direct orb usage
            if (e.key >= '1' && e.key <= '3' && game.state === 'playing' && !game.deathScreen && !game.showHelp) {
                const slot = parseInt(e.key) - 1;
                useOrb(slot);
            }
            
            if (e.key.toLowerCase() === 'h') {
                if (game.state === 'playing' && !game.deathScreen) {
                    game.showHelp = !game.showHelp;
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // Distance calculation
        function distance(a, b) {
            return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
        }

        // Update camera position
        function updateCamera() {
            game.camera.x = Math.max(0, Math.min(game.player.x - canvas.width / 2, 
                                                  game.mapWidth * 40 - canvas.width));
            game.camera.y = Math.max(0, Math.min(game.player.y - canvas.height / 2, 
                                                  game.mapHeight * 40 - canvas.height));
        }

        // Generate floor
        function generateFloor(floorNum) {
            game.walls = [];
            game.orbs = [];
            game.ghouls = [];
            game.particles = [];
            game.explored.clear();
            
            const cellSize = 40;
            const grid = [];
            
            // Initialize grid
            for (let y = 0; y < game.mapHeight; y++) {
                grid[y] = [];
                for (let x = 0; x < game.mapWidth; x++) {
                    grid[y][x] = 1;
                }
            }
            
            // Generate maze
            const stack = [];
            const startCell = { x: 1, y: game.mapHeight - 2 };
            grid[startCell.y][startCell.x] = 0;
            stack.push(startCell);
            
            const directions = [
                { dx: 0, dy: -2 },
                { dx: 2, dy: 0 },
                { dx: 0, dy: 2 },
                { dx: -2, dy: 0 }
            ];
            
            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const neighbors = [];
                
                for (const dir of directions) {
                    const nx = current.x + dir.dx;
                    const ny = current.y + dir.dy;
                    
                    if (nx > 0 && nx < game.mapWidth - 1 && ny > 0 && ny < game.mapHeight - 1 && grid[ny][nx] === 1) {
                        neighbors.push({ x: nx, y: ny, dx: dir.dx / 2, dy: dir.dy / 2 });
                    }
                }
                
                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    grid[next.y][next.x] = 0;
                    grid[current.y + next.dy][current.x + next.dx] = 0;
                    stack.push(next);
                } else {
                    stack.pop();
                }
            }
            
            // Create rooms
            const numRooms = 3 + Math.floor(floorNum / 10);
            for (let i = 0; i < numRooms; i++) {
                const roomX = 2 + Math.floor(Math.random() * (game.mapWidth - 6));
                const roomY = 2 + Math.floor(Math.random() * (game.mapHeight - 6));
                const roomW = 2 + Math.floor(Math.random() * 3);
                const roomH = 2 + Math.floor(Math.random() * 3);
                
                for (let ry = 0; ry < roomH; ry++) {
                    for (let rx = 0; rx < roomW; rx++) {
                        if (roomX + rx < game.mapWidth - 1 && roomY + ry < game.mapHeight - 1) {
                            grid[roomY + ry][roomX + rx] = 0;
                        }
                    }
                }
            }
            
            // Convert grid to walls
            for (let y = 0; y < game.mapHeight; y++) {
                for (let x = 0; x < game.mapWidth; x++) {
                    if (grid[y][x] === 1) {
                        game.walls.push({
                            x: x * cellSize + cellSize / 2,
                            y: y * cellSize + cellSize / 2
                        });
                    }
                }
            }
            
            // Find empty spaces
            const emptySpaces = [];
            for (let y = 1; y < game.mapHeight - 1; y++) {
                for (let x = 1; x < game.mapWidth - 1; x++) {
                    if (grid[y][x] === 0) {
                        emptySpaces.push({ 
                            x: x * cellSize + cellSize / 2, 
                            y: y * cellSize + cellSize / 2 
                        });
                    }
                }
            }
            
            // Place death markers from previous attempts
            for (const marker of game.player.deathMarkers) {
                if (marker.floor === floorNum) {
                    game.orbs.push({
                        x: marker.x,
                        y: marker.y,
                        type: 'wisp',
                        collected: false,
                        pulse: 0
                    });
                }
            }
            
            // Place orbs
            const orbCount = 12;
            for (let i = 0; i < Math.min(orbCount, emptySpaces.length - 2); i++) {
                const idx = Math.floor(Math.random() * emptySpaces.length);
                const space = emptySpaces.splice(idx, 1)[0];
                
                let type = 'common';
                const roll = Math.random();
                if (roll > 0.95) type = 'red';  // Very rare (5% chance)
                else if (roll > 0.75) type = 'white';
                else if (roll > 0.55) type = 'green';
                else if (roll > 0.35) type = 'purple';
                else if (roll > 0.15) type = 'golden';
                
                game.orbs.push({
                    x: space.x,
                    y: space.y,
                    type: type,
                    collected: false,
                    pulse: Math.random() * Math.PI * 2
                });
            }
            
            // Place ghouls
            const ghoulCount = 2 + Math.floor(floorNum / 3);
            for (let i = 0; i < Math.min(ghoulCount, emptySpaces.length); i++) {
                const idx = Math.floor(Math.random() * emptySpaces.length);
                const space = emptySpaces.splice(idx, 1)[0];
                
                game.ghouls.push({
                    x: space.x,
                    y: space.y,
                    speed: 0.8 + Math.random() * 0.4,
                    state: 'patrol',
                    patrolTarget: { 
                        x: Math.random() * game.mapWidth * cellSize, 
                        y: Math.random() * game.mapHeight * cellSize 
                    }
                });
            }
            
            // Place stairs in a guaranteed empty space
            if (emptySpaces.length > 0) {
                // Try to place stairs in top-right area first
                let stairsPlaced = false;
                for (const space of emptySpaces) {
                    if (space.x > game.mapWidth * 30 && space.y < game.mapHeight * 10) {
                        game.stairs = {
                            x: space.x,
                            y: space.y
                        };
                        stairsPlaced = true;
                        break;
                    }
                }
                
                // If no top-right space, use the last empty space
                if (!stairsPlaced && emptySpaces.length > 0) {
                    const stairSpace = emptySpaces[emptySpaces.length - 1];
                    game.stairs = {
                        x: stairSpace.x,
                        y: stairSpace.y
                    };
                }
            } else {
                // Fallback position if no empty spaces (shouldn't happen)
                game.stairs = {
                    x: (game.mapWidth - 2) * cellSize,
                    y: 2 * cellSize
                };
            }
            
            console.log('Stairs placed at:', game.stairs); // Debug log
            
            // Reset player position
            game.player.x = cellSize + cellSize / 2;
            game.player.y = (game.mapHeight - 2) * cellSize + cellSize / 2;
            
            updateCamera();
        }

        // Use orb from specific slot
        function useOrb(slot) {
            const orb = game.player.inventory[slot];
            if (!orb) return;
            
            switch (orb) {
                case 'purple':
                    game.player.powers.phase = 300;
                    document.getElementById('story').textContent = 'Phase shift activated! Walk through walls!';
                    break;
                case 'green':
                    game.player.powers.regeneration = 600;
                    document.getElementById('story').textContent = 'Light regeneration activated!';
                    break;
                case 'white':
                    game.player.powers.reveal = 300;
                    document.getElementById('story').textContent = 'Map revealed!';
                    break;
                case 'red':
                    // Manual use of lifeline
                    game.player.light = 100;
                    document.getElementById('story').textContent = 'Lifeline used! Light fully restored!';
                    // Create revival effect
                    for (let i = 0; i < 20; i++) {
                        game.particles.push({
                            x: game.player.x,
                            y: game.player.y,
                            vx: (Math.random() - 0.5) * 8,
                            vy: (Math.random() - 0.5) * 8,
                            life: 40,
                            color: '#f44336'
                        });
                    }
                    break;
            }
            
            game.player.inventory[slot] = null;
            updateInventoryDisplay();
        }

        // Throw combat orb
        function throwCombatOrb() {
            let dirX = 0, dirY = 0;
            if (keys['arrowup'] || keys['w']) dirY = -1;
            if (keys['arrowdown'] || keys['s']) dirY = 1;
            if (keys['arrowleft'] || keys['a']) dirX = -1;
            if (keys['arrowright'] || keys['d']) dirX = 1;
            
            if (dirX === 0 && dirY === 0) dirX = 1;
            
            game.particles.push({
                x: game.player.x,
                y: game.player.y,
                vx: dirX * 8,
                vy: dirY * 8,
                life: 60,
                color: '#f44336',
                type: 'combatOrb',
                damage: true
            });
        }

        // Update inventory display
        function updateInventoryDisplay() {
            for (let i = 0; i < 3; i++) {
                const slot = document.getElementById(`slot${i + 1}`);
                const orb = game.player.inventory[i];
                
                slot.setAttribute('data-key', i + 1);
                
                if (orb && orbTypes[orb]) {
                    slot.textContent = orbTypes[orb].symbol;
                    slot.style.color = orbTypes[orb].color;
                    slot.style.borderColor = '#666';
                } else {
                    slot.textContent = '';
                    slot.style.color = '';
                    slot.style.borderColor = '#444';
                }
            }
        }

        // Update game
        function update() {
            if (game.state === 'menu') return;
            if (game.gameOver || game.victory || game.deathScreen || game.showHelp) return;

            game.time++;
            game.stats.sessionTime++;

            // Mark explored areas
            const px = Math.floor(game.player.x / 40);
            const py = Math.floor(game.player.y / 40);
            for (let dx = -3; dx <= 3; dx++) {
                for (let dy = -3; dy <= 3; dy++) {
                    game.explored.add(`${px + dx},${py + dy}`);
                }
            }

            // Player movement
            const oldX = game.player.x;
            const oldY = game.player.y;
            
            if (keys['arrowup'] || keys['w']) game.player.y -= game.player.speed;
            if (keys['arrowdown'] || keys['s']) game.player.y += game.player.speed;
            if (keys['arrowleft'] || keys['a']) game.player.x -= game.player.speed;
            if (keys['arrowright'] || keys['d']) game.player.x += game.player.speed;

            // Bounds check
            game.player.x = Math.max(20, Math.min(game.mapWidth * 40 - 20, game.player.x));
            game.player.y = Math.max(20, Math.min(game.mapHeight * 40 - 20, game.player.y));

            // Wall collision
            if (game.player.powers.phase <= 0) {
                for (const wall of game.walls) {
                    if (distance(game.player, wall) < 25) {
                        game.player.x = oldX;
                        game.player.y = oldY;
                        break;
                    }
                }
            }

            updateCamera();

            // Update powers
            if (game.player.powers.phase > 0) {
                game.player.powers.phase--;
                
                // Check if phase is about to end while player is in a wall
                if (game.player.powers.phase === 1) {
                    let inWall = false;
                    for (const wall of game.walls) {
                        if (distance(game.player, wall) < 25) {
                            inWall = true;
                            break;
                        }
                    }
                    
                    // If ending in wall, find nearest safe spot
                    if (inWall) {
                        let bestX = game.player.x;
                        let bestY = game.player.y;
                        let bestDist = Infinity;
                        
                        // Check surrounding areas for safe spot
                        for (let dx = -80; dx <= 80; dx += 20) {
                            for (let dy = -80; dy <= 80; dy += 20) {
                                const testX = game.player.x + dx;
                                const testY = game.player.y + dy;
                                let safe = true;
                                
                                // Check if this position is safe
                                for (const wall of game.walls) {
                                    if (distance({ x: testX, y: testY }, wall) < 25) {
                                        safe = false;
                                        break;
                                    }
                                }
                                
                                if (safe) {
                                    const dist = Math.abs(dx) + Math.abs(dy);
                                    if (dist < bestDist) {
                                        bestDist = dist;
                                        bestX = testX;
                                        bestY = testY;
                                    }
                                }
                            }
                        }
                        
                        game.player.x = bestX;
                        game.player.y = bestY;
                        document.getElementById('story').textContent = 'Phase shift ending - moved to safe location!';
                    }
                }
            }
            
            if (game.player.powers.regeneration > 0) {
                game.player.powers.regeneration--;
                game.player.light = Math.min(game.player.light + 0.1, game.player.maxLight);
            }
            
            if (game.player.powers.reveal > 0) {
                game.player.powers.reveal--;
            }

            // Update power display
            const powerStatus = [];
            if (game.player.powers.phase > 0) 
                powerStatus.push(`Phase: ${Math.ceil(game.player.powers.phase / 60)}s`);
            if (game.player.powers.regeneration > 0) 
                powerStatus.push(`Regen: ${Math.ceil(game.player.powers.regeneration / 60)}s`);
            if (game.player.powers.reveal > 0) 
                powerStatus.push(`Reveal: ${Math.ceil(game.player.powers.reveal / 60)}s`);
            
            document.getElementById('powerStatus').textContent = powerStatus.join(' | ');

            // Update light
            if (game.player.powers.regeneration <= 0) {
                game.player.light -= 0.02; // Reduced from 0.05 to 0.02 (60% slower)
            }
            
            // Clamp light to minimum 0
            game.player.light = Math.max(0, game.player.light);
            
            if (game.player.light <= 0 && !game.swarming) {
                // Check for lifeline orb
                let hasLifeline = false;
                let lifelineSlot = -1;
                
                for (let i = 0; i < 3; i++) {
                    if (game.player.inventory[i] === 'red') {
                        hasLifeline = true;
                        lifelineSlot = i;
                        break;
                    }
                }
                
                if (hasLifeline) {
                    // Auto-use lifeline
                    game.player.light = 100;
                    game.player.inventory[lifelineSlot] = null;
                    updateInventoryDisplay();
                    document.getElementById('story').textContent = 'LIFELINE ACTIVATED! Your red orb saved you!';
                    
                    // Create dramatic revival effect
                    for (let i = 0; i < 30; i++) {
                        const angle = (Math.PI * 2 / 30) * i;
                        game.particles.push({
                            x: game.player.x,
                            y: game.player.y,
                            vx: Math.cos(angle) * 5,
                            vy: Math.sin(angle) * 5,
                            life: 60,
                            color: '#f44336'
                        });
                    }
                    
                    // Flash effect
                    game.player.lightRadius = 250;
                    setTimeout(() => game.player.lightRadius = 150, 500);
                } else {
                    // Start the swarm sequence
                    game.swarming = true;
                    game.swarmTimer = 180; // 3 seconds
                    document.getElementById('story').textContent = 'The darkness consumes you... The ghouls are coming!';
                    
                    // Alert all ghouls
                    for (const ghoul of game.ghouls) {
                        ghoul.state = 'swarming';
                        ghoul.speed *= 2.5;
                    }
                    
                    // Spawn edge ghouls
                    for (let i = 0; i < 8; i++) {
                        const edge = Math.floor(Math.random() * 4);
                        let x, y;
                        switch(edge) {
                            case 0: x = Math.random() * canvas.width + game.camera.x; y = game.camera.y - 20; break;
                            case 1: x = game.camera.x + canvas.width + 20; y = Math.random() * canvas.height + game.camera.y; break;
                            case 2: x = Math.random() * canvas.width + game.camera.x; y = game.camera.y + canvas.height + 20; break;
                            case 3: x = game.camera.x - 20; y = Math.random() * canvas.height + game.camera.y; break;
                        }
                        game.ghouls.push({
                            x: x,
                            y: y,
                            speed: 3,
                            state: 'swarming',
                            patrolTarget: { x: game.player.x, y: game.player.y }
                        });
                    }
                }
            }
            
            // Handle swarm timer
            if (game.swarming && game.swarmTimer > 0) {
                game.swarmTimer--;
                
                if (game.swarmTimer < 60) {
                    game.darknessFade = 1 - (game.swarmTimer / 60);
                }
                
                if (game.swarmTimer <= 0) {
                    // Show death screen instead of auto-respawn
                    game.deathScreen = true;
                    game.stats.totalDeaths++;
                    game.stats.totalOrbs += game.player.orbsCollected;
                    game.stats.totalFloors += game.floor - 1;
                    if (game.floor > game.stats.bestFloor) {
                        game.stats.bestFloor = game.floor;
                    }
                    document.getElementById('story').textContent = '';
                }
            }

            // Collect orbs
            for (const orb of game.orbs) {
                if (!orb.collected && distance(game.player, orb) < 25) {
                    orb.collected = true;
                    
                    const orbType = orbTypes[orb.type];
                    if (!orbType) continue;
                    
                    if (orbType.lightBonus) {
                        game.player.light = Math.min(game.player.light + orbType.lightBonus, game.player.maxLight);
                        if (orb.type !== 'wisp') {
                            game.player.orbsCollected++;
                        }
                    } else if (orbType.power) {
                        let added = false;
                        for (let i = 0; i < 3; i++) {
                            if (!game.player.inventory[i]) {
                                game.player.inventory[i] = orb.type;
                                added = true;
                                updateInventoryDisplay();
                                document.getElementById('story').textContent = 
                                    `Collected ${orb.type} orb! Press ${i + 1} to select, SPACE to use.`;
                                break;
                            }
                        }
                        
                        if (!added) {
                            document.getElementById('story').textContent = 'Inventory full!';
                            orb.collected = false;
                        }
                    }
                    
                    if (orb.collected) {
                        for (let i = 0; i < 10; i++) {
                            game.particles.push({
                                x: orb.x,
                                y: orb.y,
                                vx: (Math.random() - 0.5) * 4,
                                vy: (Math.random() - 0.5) * 4,
                                life: 30,
                                color: orbType.color
                            });
                        }
                    }
                }
            }

            // Update ghouls
            for (const ghoul of game.ghouls) {
                const distToPlayer = distance(ghoul, game.player);
                
                if (game.swarming) {
                    const angle = Math.atan2(game.player.y - ghoul.y, game.player.x - ghoul.x);
                    ghoul.x += Math.cos(angle) * ghoul.speed;
                    ghoul.y += Math.sin(angle) * ghoul.speed;
                } else if (distToPlayer < game.player.lightRadius * 0.6) {
                    const angle = Math.atan2(ghoul.y - game.player.y, ghoul.x - game.player.x);
                    ghoul.x += Math.cos(angle) * ghoul.speed * 2;
                    ghoul.y += Math.sin(angle) * ghoul.speed * 2;
                    ghoul.state = 'fleeing';
                } else if (distToPlayer < game.player.lightRadius * 1.2) {
                    const angle = Math.atan2(game.player.y - ghoul.y, game.player.x - ghoul.x);
                    ghoul.x += Math.cos(angle) * ghoul.speed * 0.7;
                    ghoul.y += Math.sin(angle) * ghoul.speed * 0.7;
                    ghoul.state = 'stalking';
                } else {
                    if (!ghoul.patrolTarget || distance(ghoul, ghoul.patrolTarget) < 20) {
                        ghoul.patrolTarget = { 
                            x: Math.random() * game.mapWidth * 40, 
                            y: Math.random() * game.mapHeight * 40 
                        };
                    }
                    const angle = Math.atan2(ghoul.patrolTarget.y - ghoul.y, ghoul.patrolTarget.x - ghoul.x);
                    ghoul.x += Math.cos(angle) * ghoul.speed;
                    ghoul.y += Math.sin(angle) * ghoul.speed;
                    ghoul.state = 'patrol';
                }
                
                if (!game.swarming && distToPlayer < 30 && distToPlayer > game.player.lightRadius * 0.8) {
                    game.player.light -= 0.3; // Reduced from 0.5
                    game.player.light = Math.max(0, game.player.light); // Clamp to 0
                }
            }

            // Update particles
            game.particles = game.particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.95;
                p.vy *= 0.95;
                p.life--;
                
                return p.life > 0;
            });

            // Check stairs - larger detection radius
            if (game.stairs && distance(game.player, game.stairs) < 40) {
                game.floor++;
                if (game.floor >= 50) {
                    game.victory = true;
                    document.getElementById('story').textContent = 'You found the Pearl of Kuwait!';
                } else {
                    if (game.floor % 5 === 0) {
                        game.checkpoint = game.floor;
                        document.getElementById('checkpoint').textContent = game.checkpoint;
                        document.getElementById('story').textContent = `Floor -${game.floor}: Checkpoint saved!`;
                    } else {
                        document.getElementById('story').textContent = `Floor -${game.floor}: Deeper into darkness...`;
                    }
                    generateFloor(game.floor);
                    game.player.light = Math.min(game.player.light + 30, 100);
                }
            }

            // Update UI
            document.getElementById('floor').textContent = -game.floor;
            document.getElementById('lightTime').textContent = Math.round(Math.max(0, game.player.light));
            document.getElementById('lightBar').style.width = `${Math.max(0, game.player.light)}%`;
            document.getElementById('orbs').textContent = game.player.orbsCollected;
        }

        // Render game
        function render() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (game.state === 'menu') {
                renderMenu();
                return;
            }

            ctx.save();
            ctx.translate(-game.camera.x, -game.camera.y);

            // Draw floor tiles
            const startX = Math.floor(game.camera.x / 40);
            const endX = Math.ceil((game.camera.x + canvas.width) / 40);
            const startY = Math.floor(game.camera.y / 40);
            const endY = Math.ceil((game.camera.y + canvas.height) / 40);
            
            ctx.strokeStyle = '#222';
            for (let x = startX; x <= endX; x++) {
                for (let y = startY; y <= endY; y++) {
                    const tileX = x * 40;
                    const tileY = y * 40;
                    const dist = distance({ x: tileX + 20, y: tileY + 20 }, game.player);
                    
                    if (dist < game.player.lightRadius * 1.5 || game.player.powers.reveal > 0) {
                        ctx.globalAlpha = game.player.powers.reveal > 0 ? 0.5 : 
                                         Math.max(0, 1 - (dist / (game.player.lightRadius * 1.5)));
                        ctx.strokeRect(tileX, tileY, 40, 40);
                    }
                }
            }
            ctx.globalAlpha = 1;

            // Draw walls
            ctx.fillStyle = '#333';
            for (const wall of game.walls) {
                const dist = distance(wall, game.player);
                if (dist < game.player.lightRadius * 1.5 || game.player.powers.reveal > 0) {
                    ctx.globalAlpha = Math.max(0.3, 1 - (dist / (game.player.lightRadius * 2)));
                    ctx.fillRect(wall.x - 15, wall.y - 15, 30, 30);
                }
            }
            ctx.globalAlpha = 1;

            // Draw stairs (always visible when in light or reveal) - DRAW AFTER WALLS
            if (game.stairs) {
                const dist = distance(game.stairs, game.player);
                // More generous visibility range
                if (dist < game.player.lightRadius * 1.5 || game.player.powers.reveal > 0 || dist < 100) {
                    // Base platform - larger and brighter
                    ctx.fillStyle = '#666';
                    ctx.fillRect(game.stairs.x - 30, game.stairs.y - 30, 60, 60);
                    
                    // Inner platform
                    ctx.fillStyle = '#555';
                    ctx.fillRect(game.stairs.x - 25, game.stairs.y - 25, 50, 50);
                    
                    // Stair steps
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 4; i++) {
                        ctx.beginPath();
                        ctx.moveTo(game.stairs.x - 20 + i * 5, game.stairs.y - 15 + i * 5);
                        ctx.lineTo(game.stairs.x + 20, game.stairs.y - 15 + i * 5);
                        ctx.stroke();
                    }
                    
                    // Down arrow - bigger and brighter
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 32px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('▼', game.stairs.x, game.stairs.y + 10);
                    ctx.font = '12px monospace';
                    ctx.fillText('EXIT', game.stairs.x, game.stairs.y - 20);
                    ctx.textAlign = 'left';
                    
                    // Pulsing glow effect - more visible
                    ctx.globalAlpha = 0.4 + Math.sin(game.time * 0.05) * 0.3;
                    ctx.strokeStyle = '#ffeb3b';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(game.stairs.x - 32, game.stairs.y - 32, 64, 64);
                    
                    // Inner glow
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(game.stairs.x - 28, game.stairs.y - 28, 56, 56);
                    ctx.globalAlpha = 1;
                }
            }

            // Draw orbs
            for (const orb of game.orbs) {
                if (orb.collected) continue;
                
                const dist = distance(orb, game.player);
                if (dist < game.player.lightRadius * 1.5 || game.player.powers.reveal > 0) {
                    orb.pulse += 0.1;
                    const pulseSize = Math.sin(orb.pulse) * 3;
                    
                    if (orb.type === 'wisp') {
                        // Death marker wisp
                        ctx.globalAlpha = 0.6 + Math.sin(game.time * 0.05) * 0.3;
                        const wispGlow = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, 30);
                        wispGlow.addColorStop(0, 'rgba(200, 200, 255, 0.8)');
                        wispGlow.addColorStop(1, 'rgba(100, 100, 255, 0)');
                        ctx.fillStyle = wispGlow;
                        ctx.fillRect(orb.x - 30, orb.y - 30, 60, 60);
                    } else {
                        // Regular orbs
                        ctx.globalAlpha = 0.5;
                        const glowGradient = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, 20 + pulseSize);
                        glowGradient.addColorStop(0, orbTypes[orb.type].color);
                        glowGradient.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = glowGradient;
                        ctx.fillRect(orb.x - 30, orb.y - 30, 60, 60);
                    }
                    
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = orbTypes[orb.type].color;
                    ctx.beginPath();
                    ctx.arc(orb.x, orb.y, 8 + pulseSize, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Inner shine
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(orb.x - 3, orb.y - 3, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;

            // Draw ghouls
            for (const ghoul of game.ghouls) {
                const dist = distance(ghoul, game.player);
                
                if (dist < game.player.lightRadius * 2 || game.player.powers.reveal > 0 || game.swarming) {
                    let alpha = 1;
                    if (!game.swarming && dist < game.player.lightRadius * 0.6) {
                        alpha = 0.3;
                    } else if (!game.swarming && dist < game.player.lightRadius) {
                        alpha = 0.6;
                    }
                    
                    ctx.globalAlpha = alpha;
                    
                    ctx.fillStyle = ghoul.state === 'stunned' ? '#111' : '#200';
                    ctx.fillRect(ghoul.x - 12, ghoul.y - 20, 24, 35);
                    
                    // Ghoul cloak
                    ctx.fillStyle = '#100';
                    ctx.beginPath();
                    ctx.moveTo(ghoul.x - 15, ghoul.y - 20);
                    ctx.lineTo(ghoul.x + 15, ghoul.y - 20);
                    ctx.lineTo(ghoul.x + 20, ghoul.y + 15);
                    ctx.lineTo(ghoul.x - 20, ghoul.y + 15);
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.fillStyle = game.swarming ? '#ff0' : (ghoul.state === 'stalking' ? '#f00' : '#800');
                    ctx.shadowBlur = game.swarming ? 20 : 10;
                    ctx.shadowColor = game.swarming ? '#ff0' : '#f00';
                    ctx.beginPath();
                    ctx.arc(ghoul.x - 5, ghoul.y - 10, game.swarming ? 4 : 3, 0, Math.PI * 2);
                    ctx.arc(ghoul.x + 5, ghoul.y - 10, game.swarming ? 4 : 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            ctx.globalAlpha = 1;

            // Draw particles
            for (const particle of game.particles) {
                ctx.globalAlpha = particle.life / 30;
                ctx.fillStyle = particle.color;
                if (particle.type === 'combatOrb') {
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(particle.x - 2, particle.y - 2, 4, 4);
                }
            }
            ctx.globalAlpha = 1;

            // Draw player
            ctx.fillStyle = game.player.powers.phase > 0 ? 'rgba(255, 255, 255, 0.5)' : '#fff';
            ctx.beginPath();
            ctx.arc(game.player.x, game.player.y, 10, 0, Math.PI * 2);
            ctx.fill();
            
            // Player inner detail
            ctx.fillStyle = game.player.powers.phase > 0 ? 'rgba(200, 200, 200, 0.5)' : '#ccc';
            ctx.beginPath();
            ctx.arc(game.player.x, game.player.y, 6, 0, Math.PI * 2);
            ctx.fill();
            
            if (game.player.powers.phase > 0) {
                ctx.strokeStyle = '#9c27b0';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.arc(game.player.x, game.player.y, 14, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            ctx.strokeStyle = '#ffeb3b';
            ctx.globalAlpha = 0.5;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(game.player.x, game.player.y, 20, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Draw light effect
            const gradient = ctx.createRadialGradient(
                game.player.x, game.player.y, 0,
                game.player.x, game.player.y, game.player.lightRadius
            );
            gradient.addColorStop(0, 'rgba(255, 248, 200, 0.3)');
            gradient.addColorStop(0.5, 'rgba(255, 200, 100, 0.1)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = gradient;
            ctx.fillRect(
                game.player.x - game.player.lightRadius, 
                game.player.y - game.player.lightRadius,
                game.player.lightRadius * 2, 
                game.player.lightRadius * 2
            );
            ctx.globalCompositeOperation = 'source-over';

            ctx.restore();

            // Draw darkness vignette
            const vignette = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width / 2
            );
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(0.7, 'rgba(0,0,0,0.3)');
            vignette.addColorStop(1, 'rgba(0,0,0,0.8)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Complete darkness fade during swarm
            if (game.darknessFade > 0) {
                ctx.fillStyle = `rgba(0, 0, 0, ${game.darknessFade})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Draw minimap
            renderMinimap();

            // Help screen overlay
            if (game.showHelp) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ffeb3b';
                ctx.font = 'bold 24px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('GAME HELP', canvas.width / 2, 50);
                
                ctx.fillStyle = '#fff';
                ctx.font = '16px monospace';
                ctx.fillText('OBJECTIVE', canvas.width / 2, 90);
                ctx.fillStyle = '#aaa';
                ctx.font = '12px monospace';
                ctx.fillText('Descend to floor -50 and find the Pearl of Kuwait', canvas.width / 2, 110);
                ctx.fillText('Find the stairs (▼) on each floor to go deeper', canvas.width / 2, 130);
                
                // Controls
                ctx.fillStyle = '#fff';
                ctx.font = '16px monospace';
                ctx.fillText('CONTROLS', canvas.width / 2, 170);
                ctx.fillStyle = '#aaa';
                ctx.font = '12px monospace';
                ctx.fillText('Arrow Keys / WASD: Move', canvas.width / 2, 190);
                ctx.fillText('1-3: Select inventory slot', canvas.width / 2, 210);
                ctx.fillText('Space/E: Use selected orb', canvas.width / 2, 230);
                ctx.fillText('H: Toggle this help', canvas.width / 2, 250);
                
                // Orb guide
                ctx.fillStyle = '#fff';
                ctx.font = '16px monospace';
                ctx.fillText('ORB TYPES', canvas.width / 2, 290);
                
                ctx.textAlign = 'left';
                const orbX = 200;
                ctx.font = '12px monospace';
                
                // Light orbs
                ctx.fillStyle = '#64b5f6';
                ctx.fillText('O  Blue Orb: Restores 20% light', orbX, 320);
                ctx.fillStyle = '#ffeb3b';
                ctx.fillText('@  Golden Orb: Restores 40% light', orbX, 340);
                ctx.fillStyle = '#ccccff';
                ctx.fillText('*  Light Wisp: Death marker - Restores 50% light', orbX, 360);
                
                // Power orbs
                ctx.fillStyle = '#9c27b0';
                ctx.fillText('P  Purple Orb: Phase through walls for 5 seconds', orbX, 390);
                ctx.fillStyle = '#4caf50';
                ctx.fillText('G  Green Orb: Regenerate light for 10 seconds', orbX, 410);
                ctx.fillStyle = '#fff';
                ctx.fillText('W  White Orb: Reveal entire map for 5 seconds', orbX, 430);
                ctx.fillStyle = '#f44336';
                ctx.fillText('♥  Red Orb: LIFELINE - Auto-revives you at 0% light!', orbX, 450);
                
                ctx.textAlign = 'center';
                ctx.fillStyle = '#666';
                ctx.font = '14px monospace';
                ctx.fillText('Press H to close', canvas.width / 2, 520);
            }
            
            // Death screen overlay
            if (game.deathScreen) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.95)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Title
                ctx.fillStyle = '#f44336';
                ctx.font = 'bold 36px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('CONSUMED BY DARKNESS', canvas.width / 2, 100);
                
                // Stats
                ctx.fillStyle = '#fff';
                ctx.font = '18px monospace';
                ctx.fillText('SESSION STATISTICS', canvas.width / 2, 160);
                
                ctx.fillStyle = '#aaa';
                ctx.font = '14px monospace';
                ctx.textAlign = 'left';
                const statsX = canvas.width / 2 - 150;
                ctx.fillText(`Current Floor: ${-game.floor}`, statsX, 200);
                ctx.fillText(`Checkpoint: Floor ${-game.checkpoint}`, statsX, 220);
                ctx.fillText(`Orbs Collected: ${game.player.orbsCollected}`, statsX, 240);
                ctx.fillText(`Deaths This Run: ${game.stats.totalDeaths}`, statsX, 260);
                ctx.fillText(`Best Floor Reached: ${-game.stats.bestFloor}`, statsX, 280);
                
                // Leaderboard preview
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffeb3b';
                ctx.font = '16px monospace';
                ctx.fillText('EXPLORER MODE RANKINGS', canvas.width / 2, 330);
                
                ctx.fillStyle = '#888';
                ctx.font = '12px monospace';
                ctx.fillText('1. Shadow_Walker - Floor 47', canvas.width / 2, 355);
                ctx.fillText('2. LightKeeper - Floor 42', canvas.width / 2, 375);
                ctx.fillText('3. DuneRunner - Floor 38', canvas.width / 2, 395);
                ctx.fillText(`... You - Floor ${-game.stats.bestFloor}`, canvas.width / 2, 415);
                
                // Buttons
                const btnY = 460;
                const btnHeight = 50;
                const btnGap = 20;
                
                // Respawn button
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(canvas.width / 2 - 200 - btnGap, btnY, 180, btnHeight);
                ctx.strokeStyle = '#66bb6a';
                ctx.lineWidth = 2;
                ctx.strokeRect(canvas.width / 2 - 200 - btnGap, btnY, 180, btnHeight);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px monospace';
                ctx.fillText('RESPAWN', canvas.width / 2 - 110 - btnGap, btnY + 30);
                
                // Quit button
                ctx.fillStyle = '#f44336';
                ctx.fillRect(canvas.width / 2 + btnGap, btnY, 180, btnHeight);
                ctx.strokeStyle = '#ef5350';
                ctx.strokeRect(canvas.width / 2 + btnGap, btnY, 180, btnHeight);
                
                ctx.fillStyle = '#fff';
                ctx.fillText('QUIT TO MENU', canvas.width / 2 + 110 + btnGap, btnY + 30);
                
                ctx.textAlign = 'left';
            }
            
            // Game over/victory overlay
            if (game.gameOver || game.victory) {
                ctx.fillStyle = 'rgba(0, 0, 0, 1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = game.victory ? '#ffeb3b' : '#f44336';
                ctx.font = '48px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(game.victory ? 'VICTORY!' : 'GAME OVER', canvas.width / 2, canvas.height / 2);
                ctx.font = '16px monospace';
                ctx.fillStyle = '#fff';
                ctx.fillText('Press R to return to menu', canvas.width / 2, canvas.height / 2 + 40);
                ctx.textAlign = 'left';
            }
        }

        // Render minimap
        function renderMinimap() {
            minimapCtx.fillStyle = '#111';
            minimapCtx.fillRect(0, 0, 150, 150);
            
            const scale = 150 / Math.max(game.mapWidth * 40, game.mapHeight * 40);
            
            // Draw explored areas
            minimapCtx.fillStyle = '#222';
            for (const coord of game.explored) {
                const [x, y] = coord.split(',').map(Number);
                if (!isNaN(x) && !isNaN(y)) {
                    minimapCtx.fillRect(x * 40 * scale, y * 40 * scale, 40 * scale, 40 * scale);
                }
            }
            
            // Draw walls
            minimapCtx.fillStyle = '#444';
            for (const wall of game.walls) {
                const tileX = Math.floor(wall.x / 40);
                const tileY = Math.floor(wall.y / 40);
                if (game.explored.has(`${tileX},${tileY}`) || game.player.powers.reveal > 0) {
                    minimapCtx.fillRect(
                        (wall.x - 15) * scale, 
                        (wall.y - 15) * scale, 
                        30 * scale, 
                        30 * scale
                    );
                }
            }
            
            // Draw stairs if revealed on minimap
            if (game.stairs) {
                // Always show on minimap if explored or revealed
                const stairTileX = Math.floor(game.stairs.x / 40);
                const stairTileY = Math.floor(game.stairs.y / 40);
                if (game.explored.has(`${stairTileX},${stairTileY}`) || game.player.powers.reveal > 0) {
                    minimapCtx.fillStyle = '#ff0';
                    minimapCtx.fillRect(
                        (game.stairs.x - 15) * scale,
                        (game.stairs.y - 15) * scale,
                        30 * scale,
                        30 * scale
                    );
                    
                    // Add blinking effect on minimap
                    if (game.time % 60 < 30) {
                        minimapCtx.strokeStyle = '#fff';
                        minimapCtx.lineWidth = 2;
                        minimapCtx.strokeRect(
                            (game.stairs.x - 15) * scale,
                            (game.stairs.y - 15) * scale,
                            30 * scale,
                            30 * scale
                        );
                    }
                }
            }
            
            // Draw player
            minimapCtx.fillStyle = '#fff';
            minimapCtx.fillRect(
                (game.player.x - 5) * scale,
                (game.player.y - 5) * scale,
                10 * scale,
                10 * scale
            );
            
            // Draw camera bounds
            minimapCtx.strokeStyle = '#666';
            minimapCtx.strokeRect(
                game.camera.x * scale,
                game.camera.y * scale,
                canvas.width * scale,
                canvas.height * scale
            );
        }

        // Render menu
        function renderMenu() {
            // Title
            ctx.fillStyle = '#ffeb3b';
            ctx.font = 'bold 48px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('BURIED SPIRE', canvas.width / 2, 150);
            ctx.fillStyle = '#aaa';
            ctx.font = '24px monospace';
            ctx.fillText('of Kuwait', canvas.width / 2, 190);
            
            // Mode info
            ctx.fillStyle = '#fff';
            ctx.font = '20px monospace';
            ctx.fillText('EXPLORER MODE', canvas.width / 2, 250);
            
            ctx.fillStyle = '#aaa';
            ctx.font = '14px monospace';
            ctx.fillText('Checkpoints every 5 floors • Respawn on death', canvas.width / 2, 280);
            ctx.fillText('Keep collected orbs • Power-up inventory system', canvas.width / 2, 300);
            
            // Start button
            const startY = 350;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ffeb3b';
            ctx.fillStyle = '#333';
            ctx.fillRect(canvas.width / 2 - 100, startY, 200, 60);
            ctx.shadowBlur = 0;
            
            ctx.strokeStyle = '#ffeb3b';
            ctx.lineWidth = 2;
            ctx.strokeRect(canvas.width / 2 - 100, startY, 200, 60);
            
            ctx.fillStyle = '#ffeb3b';
            ctx.font = 'bold 24px monospace';
            ctx.fillText('PLAY', canvas.width / 2, startY + 38);
            
            // Instructions
            ctx.fillStyle = '#666';
            ctx.font = '12px monospace';
            ctx.fillText('WASD/Arrows: Move • 1/2/3: Use Orb (instant)', canvas.width / 2, 450);
            ctx.fillText('Click PLAY or press SPACE to begin', canvas.width / 2, 470);
            
            // Power-up guide
            ctx.fillStyle = '#888';
            ctx.font = '11px monospace';
            ctx.textAlign = 'left';
            const guideX = 150;
            const guideY = 520;
            ctx.fillText('ORBS:', guideX, guideY);
            ctx.fillStyle = '#64b5f6';
            ctx.fillText('O Blue: +20% Light', guideX + 50, guideY);
            ctx.fillStyle = '#ffeb3b';
            ctx.fillText('@ Gold: +40% Light', guideX + 200, guideY);
            ctx.fillStyle = '#9c27b0';
            ctx.fillText('P Purple: Phase through walls', guideX + 350, guideY);
            
            ctx.fillStyle = '#4caf50';
            ctx.fillText('G Green: Light regeneration', guideX + 50, guideY + 15);
            ctx.fillStyle = '#ffffff';
            ctx.fillText('W White: Reveal map', guideX + 200, guideY + 15);
            ctx.fillStyle = '#f44336';
            ctx.fillText('♥ Red: Auto-revive at 0%', guideX + 350, guideY + 15);
            
            ctx.textAlign = 'center';
        }

        // Game loop
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        // Click handler for menu and death screen
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (game.state === 'menu') {
                const startY = 350;
                if (x >= canvas.width / 2 - 100 && x <= canvas.width / 2 + 100 && 
                    y >= startY && y <= startY + 60) {
                    startGame();
                }
            } else if (game.deathScreen) {
                const btnY = 460;
                const btnHeight = 50;
                const btnGap = 20;
                
                // Respawn button
                if (x >= canvas.width / 2 - 200 - btnGap && 
                    x <= canvas.width / 2 - 20 - btnGap &&
                    y >= btnY && y <= btnY + btnHeight) {
                    respawnAtCheckpoint();
                }
                
                // Quit button
                if (x >= canvas.width / 2 + btnGap && 
                    x <= canvas.width / 2 + 200 + btnGap &&
                    y >= btnY && y <= btnY + btnHeight) {
                    quitToMenu();
                }
            }
        });

        // Respawn at checkpoint
        function respawnAtCheckpoint() {
            // Add death marker
            game.player.deathMarkers.push({
                x: game.player.x,
                y: game.player.y,
                floor: game.floor
            });
            
            // Reset to checkpoint
            game.floor = game.checkpoint;
            game.player.light = 50;
            game.swarming = false;
            game.swarmTimer = 0;
            game.darknessFade = 0;
            game.deathScreen = false;
            generateFloor(game.floor);
            document.getElementById('story').textContent = 'Respawned at checkpoint. Look for your light wisp!';
        }

        // Quit to menu
        function quitToMenu() {
            game.state = 'menu';
            game.deathScreen = false;
            game.swarming = false;
            game.swarmTimer = 0;
            game.darknessFade = 0;
            
            // Hide UI elements
            document.getElementById('ui').style.display = 'none';
            document.getElementById('minimap').style.display = 'none';
            document.getElementById('inventory').style.display = 'none';
            document.getElementById('story').style.display = 'none';
            document.getElementById('powerStatus').textContent = '';
        }

        // Start game
        function startGame() {
            game.state = 'playing';
            game.floor = 1;
            game.checkpoint = 1;
            game.player.light = 100;
            game.player.orbsCollected = 0;
            game.player.inventory = [null, null, null];
            game.player.powers = { phase: 0, regeneration: 0, reveal: 0 };
            game.player.deathMarkers = [];
            game.gameOver = false;
            game.victory = false;
            game.swarming = false;
            game.swarmTimer = 0;
            game.darknessFade = 0;
            generateFloor(1);
            updateInventoryDisplay();
            
            // Show UI elements
            document.getElementById('ui').style.display = 'block';
            document.getElementById('minimap').style.display = 'block';
            document.getElementById('inventory').style.display = 'flex';
            document.getElementById('story').style.display = 'block';
            document.getElementById('story').textContent = 'The Burj Mubarak stretches below you, buried in sand and darkness...';
            document.getElementById('checkpoint').textContent = '1';
        }

        // Keyboard handler
        window.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r' && (game.gameOver || game.victory)) {
                game.state = 'menu';
                game.gameOver = false;
                game.victory = false;
                game.swarming = false;
                game.swarmTimer = 0;
                game.darknessFade = 0;
                document.getElementById('story').textContent = '';
                document.getElementById('powerStatus').textContent = '';
            }
            
            if (e.key === ' ' && game.state === 'menu') {
                e.preventDefault();
                startGame();
            }
        });

        // Initialize
        game.state = 'menu';
        updateInventoryDisplay();
        gameLoop();
    </script>
</body>
</html>
