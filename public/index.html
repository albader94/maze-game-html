<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Buried Spire Quest - Explorer Mode</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="A 2D dungeon crawler set in the ancient buried towers of Burj Mubarak">
    <meta name="theme-color" content="#8B4513">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Buried Spire">

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; connect-src https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://www.googleapis.com https://securetoken.googleapis.com wss://firestore.googleapis.com; frame-src https://apis.google.com https://*.firebaseauth.com https://*.firebaseapp.com; style-src 'self'; img-src 'self' data:; font-src 'self'; media-src 'self';">

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    
    <link rel="stylesheet" href="../src/css/styles.css">
    <link rel="stylesheet" href="../src/css/ui.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <canvas id="minimap"></canvas>
        
        <!-- Game UI -->
        <div id="ui">
            <div>Floor: <span id="floor">-1</span></div>
            <div>Light: <span id="lightTime">100</span>%</div>
            <div class="light-bar">
                <div class="light-fill" id="lightBar"></div>
            </div>
            <div>Orbs: <span id="orbs">0</span></div>
            <div>Checkpoint: <span id="checkpoint">1</span></div>
            <div id="powerStatus"></div>
        </div>

        <!-- Inventory -->
        <div id="inventory">
            <div class="inventory-slot" id="slot1" data-key="1"></div>
            <div class="inventory-slot" id="slot2" data-key="2"></div>
            <div class="inventory-slot" id="slot3" data-key="3"></div>
        </div>
        
        <!-- Story/Message Display -->
        <div id="story"></div>
        
        <!-- PWA Install Prompt -->
        <div id="installPrompt">
            <p>Install this game for offline play!</p>
            <button id="installBtn" class="install-btn">Install</button>
            <button id="dismissInstall" class="install-dismiss-btn">Not now</button>
        </div>
    </div>

    <!-- Silence debug logs in production (keep console.error for real issues) -->
    <script>
    (function() {
        var host = window.location.hostname;
        if (host !== 'localhost' && host !== '127.0.0.1' && host !== '') {
            var noop = function() {};
            console.log = noop;
            console.warn = noop;
            console.debug = noop;
            console.info = noop;
        }
    })();
    </script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js" integrity="sha384-nMqKrgk2MOVr+J6K7dYFdt02ATuHV/Bqbpl7SQl+GYXyf1CHx9oLuiXNpVdd0rJh" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js" integrity="sha384-I1LYojsZ5RM1cOda44Z2h42Qa6YfsQ1XkXxREnhp4ueYBR/4d1pG1K+NZM537Vsj" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js" integrity="sha384-DRaDw8zunay8Id8djbfyBTcL38QknHkXONVwo0TBWCAQGSpIANj+4OSCTdxxaY5T" crossorigin="anonymous"></script>

    <!-- Leaderboard (depends on Firebase SDK) -->
    <script src="../src/js/leaderboard.js"></script>

    <!-- JavaScript files in dependency order -->
    <!-- Core configuration and constants -->
    <script src="../src/js/config.js"></script>
    <script src="../src/js/messages.js"></script>
    
    <!-- Utility and helper functions -->
    <script src="../src/js/utils.js"></script>
    
    <!-- Sound system -->
    <script src="../src/js/soundManager.js"></script>
    
    <!-- Game state and data management -->
    <script src="../src/js/gameState.js"></script>
    
    <!-- Tutorial system -->
    <script src="../src/js/tutorial.js"></script>
    
    <!-- Input handling -->
    <script src="../src/js/input.js"></script>
    
    <!-- Game systems -->
    <script src="../src/js/mapGenerator.js"></script>
    <script src="../src/js/entities.js"></script>
    <script src="../src/js/inventory.js"></script>
    <script src="../src/js/renderer.js"></script>
    
    <!-- Game logic and main loop -->
    <script src="../src/js/gameLogic.js"></script>
    <script src="../src/js/storyNarration.js"></script>
    <script src="../src/js/main.js"></script>
    
    <!-- PWA Service Worker Registration -->
    <script src="../src/js/pwa.js"></script>
</body>
</html>
