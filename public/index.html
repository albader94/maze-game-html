<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buried Spire of Kuwait - Explorer Mode</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="A 2D dungeon crawler set in the mystical underground of Kuwait">
    <meta name="theme-color" content="#8B4513">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Buried Spire">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    
    <link rel="stylesheet" href="../src/css/styles.css">
    <link rel="stylesheet" href="../src/css/ui.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <canvas id="minimap" style="display: none;"></canvas>
        
        <!-- Game UI -->
        <div id="ui" style="display: none;">
            <div>Floor: <span id="floor">-1</span> / -50</div>
            <div>Light: <span id="lightTime">100</span>%</div>
            <div class="light-bar">
                <div class="light-fill" id="lightBar"></div>
            </div>
            <div>Orbs: <span id="orbs">0</span></div>
            <div>Checkpoint: <span id="checkpoint">1</span></div>
            <div id="powerStatus"></div>
            <div id="stalkingIndicator" style="display: none; color: #ff4444; font-weight: bold; text-shadow: 0 0 5px #ff4444;">👁️ STALKED</div>
        </div>

        <!-- Inventory -->
        <div id="inventory" style="display: none;">
            <div class="inventory-slot" id="slot1" data-key="1"></div>
            <div class="inventory-slot" id="slot2" data-key="2"></div>
            <div class="inventory-slot" id="slot3" data-key="3"></div>
        </div>

        <!-- Story Text -->
        <div id="story">Welcome to the Buried Spire of Kuwait</div>
        
        <!-- PWA Install Prompt -->
        <div id="installPrompt" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 15px; border-radius: 8px; z-index: 10000;">
            <p>Install this game for offline play!</p>
            <button id="installBtn" style="background: #8B4513; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">Install</button>
            <button id="dismissInstall" style="background: transparent; color: #ccc; border: 1px solid #ccc; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-left: 8px;">Not now</button>
        </div>
    </div>

    <!-- JavaScript files in dependency order -->
    <!-- Core configuration and constants -->
    <script src="../src/js/config.js"></script>
    <script src="../src/js/messages.js"></script>
    
    <!-- Utility and helper functions -->
    <script src="../src/js/utils.js"></script>
    
    <!-- Game state and data management -->
    <script src="../src/js/gameState.js"></script>
    
    <!-- Tutorial system -->
    <script src="../src/js/tutorial.js"></script>
    
    <!-- Input handling -->
    <script src="../src/js/input.js"></script>
    
    <!-- Game systems -->
    <script src="../src/js/mapGenerator.js"></script>
    <script src="../src/js/entities.js"></script>
    <script src="../src/js/inventory.js"></script>
    <script src="../src/js/renderer.js"></script>
    
    <!-- Game logic and main loop -->
    <script src="../src/js/gameLogic.js"></script>
    <script src="../src/js/main.js"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
        // Register service worker for offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('✅ SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('❌ SW registration failed: ', registrationError);
                    });
            });
        }
        
        // PWA Install Prompt
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');
        const dismissBtn = document.getElementById('dismissInstall');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installPrompt.style.display = 'block';
        });
        
        installBtn.addEventListener('click', () => {
            installPrompt.style.display = 'none';
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    }
                    deferredPrompt = null;
                });
            }
        });
        
        dismissBtn.addEventListener('click', () => {
            installPrompt.style.display = 'none';
        });
        
        // Hide install prompt if already installed
        window.addEventListener('appinstalled', () => {
            installPrompt.style.display = 'none';
            console.log('PWA was installed');
        });
    </script>
</body>
</html>
