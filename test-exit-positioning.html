<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exit Position Randomization Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            margin: 0;
            padding: 20px;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 30px;
        }
        .test-controls {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        button {
            background: #4a4a4a;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 3px;
            font-family: inherit;
        }
        button:hover {
            background: #5a5a5a;
        }
        .grid-display {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .maze-grid {
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            font-size: 10px;
            line-height: 1;
            margin-bottom: 10px;
        }
        .grid-cell {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin: 1px;
            text-align: center;
            vertical-align: top;
        }
        .wall { background: #444; }
        .empty { background: #111; }
        .spawn { background: #00ff00; color: #000; }
        .exit { background: #ff6600; color: #000; }
        .stats {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        #output {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚪 Exit Position Randomization Test</h1>
        
        <div class="test-controls">
            <button onclick="generateSingleMaze()">🎲 Generate Single Maze</button>
            <button onclick="generateMultipleMazes()">🔄 Generate 10 Mazes</button>
            <button onclick="testDistanceValidation()">📏 Test Distance Validation</button>
            <button onclick="clearOutput()">🧹 Clear Output</button>
        </div>
        
        <div id="mazeDisplay" class="grid-display"></div>
        
        <div class="stats" id="stats">
            <strong>Legend:</strong> 
            <span style="background: #00ff00; color: #000; padding: 2px 4px;">S</span> Spawn | 
            <span style="background: #ff6600; color: #000; padding: 2px 4px;">E</span> Exit | 
            <span style="background: #444; padding: 2px 4px;">█</span> Wall | 
            <span style="background: #111; padding: 2px 4px;">·</span> Empty
        </div>
        
        <div id="output">Ready to test exit positioning. Click buttons above to start.</div>
    </div>

    <!-- Load required game files -->
    <script src="src/js/config.js"></script>
    <script src="src/js/utils.js"></script>
    <script src="src/js/mapGenerator.js"></script>
    
    <script>
        const output = document.getElementById('output');
        const mazeDisplay = document.getElementById('mazeDisplay');
        
        // Override console.log to display in our output div
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            output.textContent += args.join(' ') + '\n';
            output.scrollTop = output.scrollHeight;
        };
        
        function clearOutput() {
            output.textContent = '';
            mazeDisplay.innerHTML = '';
        }
        
        function createMockGame() {
            return {
                mapWidth: 20,
                mapHeight: 15,
                walls: [],
                stairs: null,
                player: { x: 0, y: 0, size: 15 }
            };
        }
        
        function generateSingleMaze() {
            clearOutput();
            console.log("🎲 Generating single maze with randomized exit...\n");
            
            const game = createMockGame();
            MapGenerator.generateFloor(game, 1);
            
            displayMazeGrid(game, "Single Maze Test");
            
            const exitGridX = Math.floor((game.stairs.x - 20) / 40);
            const exitGridY = Math.floor((game.stairs.y - 20) / 40);
            const spawnGridX = Math.floor((game.player.x - 20) / 40);
            const spawnGridY = Math.floor((game.player.y - 20) / 40);
            
            const distance = Math.abs(exitGridX - spawnGridX) + Math.abs(exitGridY - spawnGridY);
            
            console.log(`Exit position: Grid (${exitGridX}, ${exitGridY})`);
            console.log(`Spawn position: Grid (${spawnGridX}, ${spawnGridY})`);
            console.log(`Manhattan distance: ${distance}`);
            console.log(`Exit in bottom-left quadrant: ${exitGridX < 10 && exitGridY >= 7.5 ? 'YES ⚠️' : 'NO ✅'}`);
        }
        
        function generateMultipleMazes() {
            clearOutput();
            console.log("🔄 Generating 10 mazes to test randomization...\n");
            
            const positions = [];
            const quadrantCounts = { topLeft: 0, topRight: 0, bottomLeft: 0, bottomRight: 0 };
            const distances = [];
            
            for (let i = 0; i < 10; i++) {
                const game = createMockGame();
                MapGenerator.generateFloor(game, i + 1);
                
                const exitGridX = Math.floor((game.stairs.x - 20) / 40);
                const exitGridY = Math.floor((game.stairs.y - 20) / 40);
                const spawnGridX = Math.floor((game.player.x - 20) / 40);
                const spawnGridY = Math.floor((game.player.y - 20) / 40);
                
                const distance = Math.abs(exitGridX - spawnGridX) + Math.abs(exitGridY - spawnGridY);
                
                positions.push({ x: exitGridX, y: exitGridY, distance });
                distances.push(distance);
                
                // Determine quadrant
                if (exitGridX < 10 && exitGridY < 7.5) quadrantCounts.topLeft++;
                else if (exitGridX >= 10 && exitGridY < 7.5) quadrantCounts.topRight++;
                else if (exitGridX < 10 && exitGridY >= 7.5) quadrantCounts.bottomLeft++;
                else quadrantCounts.bottomRight++;
                
                console.log(`Maze ${i + 1}: Exit at (${exitGridX}, ${exitGridY}), Distance: ${distance}`);
                
                if (i < 4) { // Show first 4 mazes visually
                    displayMazeGrid(game, `Maze ${i + 1}`);
                }
            }
            
            console.log("\n📊 RANDOMIZATION ANALYSIS:");
            console.log(`Quadrant distribution:`);
            console.log(`  Top-Left: ${quadrantCounts.topLeft}/10 (${(quadrantCounts.topLeft/10*100).toFixed(1)}%)`);
            console.log(`  Top-Right: ${quadrantCounts.topRight}/10 (${(quadrantCounts.topRight/10*100).toFixed(1)}%)`);
            console.log(`  Bottom-Left: ${quadrantCounts.bottomLeft}/10 (${(quadrantCounts.bottomLeft/10*100).toFixed(1)}%) ${quadrantCounts.bottomLeft > 0 ? '⚠️' : '✅'}`);
            console.log(`  Bottom-Right: ${quadrantCounts.bottomRight}/10 (${(quadrantCounts.bottomRight/10*100).toFixed(1)}%)`);
            
            const avgDistance = distances.reduce((a, b) => a + b, 0) / distances.length;
            const minDistance = Math.min(...distances);
            const maxDistance = Math.max(...distances);
            
            console.log(`\nDistance from spawn:`);
            console.log(`  Average: ${avgDistance.toFixed(1)}`);
            console.log(`  Min: ${minDistance} ${minDistance < 8 ? '⚠️' : '✅'}`);
            console.log(`  Max: ${maxDistance}`);
            
            // Check for position variation
            const uniquePositions = new Set(positions.map(p => `${p.x},${p.y}`)).size;
            console.log(`\nPosition variety: ${uniquePositions}/10 unique positions ${uniquePositions >= 7 ? '✅' : '⚠️'}`);
        }
        
        function testDistanceValidation() {
            clearOutput();
            console.log("📏 Testing distance validation logic...\n");
            
            // Test the distance calculation with known positions
            const testCases = [
                { spawn: {x: 2, y: 12}, exit: {x: 2, y: 11}, expectedDistance: 1 },
                { spawn: {x: 2, y: 12}, exit: {x: 10, y: 5}, expectedDistance: 15 },
                { spawn: {x: 2, y: 12}, exit: {x: 18, y: 2}, expectedDistance: 26 },
            ];
            
            testCases.forEach((test, i) => {
                const distance = Math.abs(test.exit.x - test.spawn.x) + Math.abs(test.exit.y - test.spawn.y);
                const passed = distance === test.expectedDistance;
                console.log(`Test ${i + 1}: Distance ${distance} ${passed ? '✅' : '❌'} (expected ${test.expectedDistance})`);
            });
            
            console.log("\n🔍 Validating minimum distance requirement...");
            
            // Test edge cases for minimum distance
            for (let i = 0; i < 5; i++) {
                const game = createMockGame();
                MapGenerator.generateFloor(game, i + 1);
                
                const exitGridX = Math.floor((game.stairs.x - 20) / 40);
                const exitGridY = Math.floor((game.stairs.y - 20) / 40);
                const spawnGridX = Math.floor((game.player.x - 20) / 40);
                const spawnGridY = Math.floor((game.player.y - 20) / 40);
                
                const distance = Math.abs(exitGridX - spawnGridX) + Math.abs(exitGridY - spawnGridY);
                const isValidDistance = distance >= 8;
                
                console.log(`Test ${i + 1}: Distance ${distance} ${isValidDistance ? '✅' : '❌'} (min: 8)`);
            }
        }
        
        function displayMazeGrid(game, title) {
            const gridDiv = document.createElement('div');
            gridDiv.innerHTML = `<h3>${title}</h3>`;
            
            const grid = document.createElement('div');
            grid.className = 'maze-grid';
            
            // Create a 2D representation
            const cellSize = 40;
            const gridData = [];
            
            // Initialize grid
            for (let y = 0; y < game.mapHeight; y++) {
                gridData[y] = [];
                for (let x = 0; x < game.mapWidth; x++) {
                    gridData[y][x] = 'empty';
                }
            }
            
            // Mark walls
            game.walls.forEach(wall => {
                const gridX = Math.floor((wall.x - cellSize/2) / cellSize);
                const gridY = Math.floor((wall.y - cellSize/2) / cellSize);
                if (gridY >= 0 && gridY < game.mapHeight && gridX >= 0 && gridX < game.mapWidth) {
                    gridData[gridY][gridX] = 'wall';
                }
            });
            
            // Mark spawn
            const spawnGridX = Math.floor((game.player.x - cellSize/2) / cellSize);
            const spawnGridY = Math.floor((game.player.y - cellSize/2) / cellSize);
            if (spawnGridY >= 0 && spawnGridY < game.mapHeight && spawnGridX >= 0 && spawnGridX < game.mapWidth) {
                gridData[spawnGridY][spawnGridX] = 'spawn';
            }
            
            // Mark exit
            const exitGridX = Math.floor((game.stairs.x - cellSize/2) / cellSize);
            const exitGridY = Math.floor((game.stairs.y - cellSize/2) / cellSize);
            if (exitGridY >= 0 && exitGridY < game.mapHeight && exitGridX >= 0 && exitGridX < game.mapWidth) {
                gridData[exitGridY][exitGridX] = 'exit';
            }
            
            // Render grid
            for (let y = 0; y < game.mapHeight; y++) {
                for (let x = 0; x < game.mapWidth; x++) {
                    const cell = document.createElement('span');
                    cell.className = `grid-cell ${gridData[y][x]}`;
                    
                    switch (gridData[y][x]) {
                        case 'wall': cell.textContent = '█'; break;
                        case 'spawn': cell.textContent = 'S'; break;
                        case 'exit': cell.textContent = 'E'; break;
                        case 'empty': cell.textContent = '·'; break;
                    }
                    
                    grid.appendChild(cell);
                }
                grid.appendChild(document.createElement('br'));
            }
            
            gridDiv.appendChild(grid);
            mazeDisplay.appendChild(gridDiv);
        }
        
        // Auto-run a quick test on page load
        window.onload = function() {
            setTimeout(() => {
                console.log("🚪 Exit Position Randomization Test Suite");
                console.log("=" .repeat(50));
                console.log("Testing the new randomized exit positioning system.");
                console.log("The exit should no longer always appear in the top-left corner.");
                console.log("\n🎯 Key validation criteria:");
                console.log("• Exit should NOT be in bottom-left quadrant (spawn area)");
                console.log("• Exit should be at least 8 grid units from spawn");
                console.log("• Exit positions should vary across multiple generations");
                console.log("\nClick buttons above to run tests!");
            }, 500);
        };
    </script>
</body>
</html>
